<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs><style>.mono { font-family: 'Courier New', Courier, monospace; }</style></defs>

  <rect width="800" height="220" fill="#0f0d0b" stroke="#3d3228" stroke-width="1"/>
  <rect width="800" height="36" fill="#241e18"/>
  <line x1="0" y1="36" x2="800" y2="36" stroke="#3d3228" stroke-width="1"/>
  <polygon points="0,0 14,0 0,14" fill="#e8834a" opacity="0.6"/>

  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="23" text-anchor="middle" class="mono" font-size="11" fill="#8a7a6a" letter-spacing="1">bash — grep ACHIEVEMENTS /var/log/certifications.log</text>

  <!-- prompt -->
  <text x="24" y="60" class="mono" font-size="12" fill="#e8834a">~</text>
  <text x="36" y="60" class="mono" font-size="12" fill="#c8a96e">$</text>
  <text x="48" y="60" class="mono" font-size="12" fill="#f5ede0">grep "ACHIEVEMENTS" /var/log/certifications.log</text>

  <line x1="24" y1="72" x2="776" y2="72" stroke="#3d3228" stroke-width="1"/>

  <!-- award -->
  <rect x="24" y="80" width="72" height="18" fill="#1e1a08" stroke="#4a3a10" stroke-width="1"/>
  <text x="60" y="93" text-anchor="middle" class="mono" font-size="10" fill="#e8c44a" letter-spacing="1">AWARD</text>
  <text x="108" y="93" class="mono" font-size="12" fill="#f5ede0" font-weight="bold">SPOT Award</text>
  <text x="192" y="93" class="mono" font-size="12" fill="#d4c4b0"> — exceptional development skills and product ownership.</text>

  <line x1="24" y1="108" x2="776" y2="108" stroke="#3d3228" stroke-width="1"/>

  <!-- cert 1 -->
  <rect x="24" y="116" width="72" height="18" fill="#1a1608" stroke="#3a2f10" stroke-width="1"/>
  <text x="60" y="129" text-anchor="middle" class="mono" font-size="10" fill="#c8a96e" letter-spacing="1">CERT_01</text>
  <text x="108" y="129" class="mono" font-size="12" fill="#d4c4b0">Certified in</text>
  <text x="198" y="129" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> Advanced SQL</text>
  <text x="318" y="129" class="mono" font-size="12" fill="#d4c4b0"> — HackerRank.</text>

  <line x1="24" y1="144" x2="776" y2="144" stroke="#3d3228" stroke-width="1"/>

  <!-- cert 2 -->
  <rect x="24" y="152" width="72" height="18" fill="#1a1608" stroke="#3a2f10" stroke-width="1"/>
  <text x="60" y="165" text-anchor="middle" class="mono" font-size="10" fill="#c8a96e" letter-spacing="1">CERT_02</text>
  <text x="108" y="165" class="mono" font-size="12" fill="#d4c4b0">Certified in</text>
  <text x="198" y="165" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> Python Skills</text>
  <text x="306" y="165" class="mono" font-size="12" fill="#d4c4b0"> — Cutshort.</text>

  <line x1="24" y1="180" x2="776" y2="180" stroke="#3d3228" stroke-width="1"/>

  <!-- edu -->
  <rect x="24" y="188" width="40" height="18" fill="#1a1608" stroke="#3a2f10" stroke-width="1"/>
  <text x="44" y="201" text-anchor="middle" class="mono" font-size="10" fill="#c8a96e" letter-spacing="1">EDU</text>
  <text x="76" y="201" class="mono" font-size="12" fill="#d4c4b0">B.Tech CSE —</text>
  <text x="178" y="201" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> S'O'A University, Bhubaneswar</text>
  <text x="434" y="201" class="mono" font-size="12" fill="#d4c4b0"> · CGPA</text>
  <text x="490" y="201" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> 8.27</text>
  <text x="524" y="201" class="mono" font-size="12" fill="#d4c4b0"> · Apr 2022</text>
