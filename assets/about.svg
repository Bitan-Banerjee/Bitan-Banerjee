<svg xmlns="http://www.w3.org/2000/svg" width="800" height="140" viewBox="0 0 800 140">
  <defs><style>.mono { font-family: 'Courier New', Courier, monospace; }</style></defs>

  <rect width="800" height="140" fill="#0f0d0b" stroke="#3d3228" stroke-width="1"/>
  <rect width="800" height="36" fill="#241e18"/>
  <line x1="0" y1="36" x2="800" y2="36" stroke="#3d3228" stroke-width="1"/>
  <polygon points="0,0 14,0 0,14" fill="#e8834a" opacity="0.6"/>

  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="23" text-anchor="middle" class="mono" font-size="11" fill="#8a7a6a" letter-spacing="1">bash — cat user_profile.txt</text>

  <!-- prompt -->
  <text x="24" y="60" class="mono" font-size="12" fill="#e8834a">~</text>
  <text x="36" y="60" class="mono" font-size="12" fill="#c8a96e">$</text>
  <text x="48" y="60" class="mono" font-size="12" fill="#f5ede0">cat user_profile.txt</text>
  <rect x="24" y="46" width="7" height="11" fill="#e8834a" opacity="0">
    <!-- invisible, prompt line indicator -->
  </rect>

  <!-- output lines -->
  <text x="24" y="82" class="mono" font-size="12" fill="#d4c4b0">Data Engineer with</text>
  <text x="148" y="82" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> 3.8 years</text>
  <text x="222" y="82" class="mono" font-size="12" fill="#d4c4b0"> of experience designing and modernizing complex data ecosystems.</text>
  <text x="24" y="100" class="mono" font-size="12" fill="#d4c4b0">Proven expertise in</text>
  <text x="166" y="100" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> mainframe modernization</text>
  <text x="358" y="100" class="mono" font-size="12" fill="#d4c4b0">, serverless</text>
  <text x="444" y="100" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> AWS pipelines</text>
  <text x="554" y="100" class="mono" font-size="12" fill="#d4c4b0">, and</text>
  <text x="594" y="100" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> HLD/LLD</text>
  <text x="656" y="100" class="mono" font-size="12" fill="#d4c4b0"> docs.</text>
  <text x="24" y="118" class="mono" font-size="12" fill="#d4c4b0">Skilled in</text>
  <text x="96" y="118" class="mono" font-size="12" fill="#f5ede0" font-weight="bold"> PySpark</text>
  <text x="158" y="118" class="mono" font-size="12" fill="#d4c4b0">, Python &amp; SQL — focused on transactional integrity and workflow optimization.</text>
</svg>
