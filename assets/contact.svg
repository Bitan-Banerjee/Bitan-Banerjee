<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs><style>.mono { font-family: 'Courier New', Courier, monospace; }</style></defs>

  <rect width="800" height="160" fill="#0f0d0b" stroke="#3d3228" stroke-width="1"/>
  <rect width="800" height="36" fill="#241e18"/>
  <line x1="0" y1="36" x2="800" y2="36" stroke="#3d3228" stroke-width="1"/>
  <polygon points="0,0 14,0 0,14" fill="#e8834a" opacity="0.6"/>

  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="23" text-anchor="middle" class="mono" font-size="11" fill="#8a7a6a" letter-spacing="1">bash — ping -c 1 contact_points</text>

  <!-- prompt -->
  <text x="24" y="60" class="mono" font-size="12" fill="#e8834a">~</text>
  <text x="36" y="60" class="mono" font-size="12" fill="#c8a96e">$</text>
  <text x="48" y="60" class="mono" font-size="12" fill="#f5ede0">ping -c 1 contact_points</text>

  <!-- LinkedIn entry -->
  <!-- briefcase icon (hand-drawn) -->
  <rect x="24" y="76" width="18" height="14" rx="1" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <path d="M29 76 v-3 h8 v3" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <line x1="24" y1="83" x2="42" y2="83" stroke="#e8834a" stroke-width="1.5"/>
  <text x="50" y="89" class="mono" font-size="12" fill="#8a7a6a">linkedin  :</text>
  <text x="134" y="89" class="mono" font-size="12" fill="#c8a96e">linkedin.com/in/bitan-banerjee</text>

  <!-- Email entry -->
  <!-- envelope icon -->
  <rect x="24" y="104" width="18" height="13" rx="1" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <path d="M24 105 l9 7 l9-7" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <text x="50" y="117" class="mono" font-size="12" fill="#8a7a6a">email     :</text>
  <text x="134" y="117" class="mono" font-size="12" fill="#c8a96e">banerjeebitan@outlook.com</text>

  <!-- GitHub entry -->
  <!-- circle with octocat-ish simple circle+dot icon -->
  <circle cx="33" cy="138" r="9" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <circle cx="33" cy="138" r="3.5" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <line x1="33" y1="129" x2="33" y2="126" stroke="#e8834a" stroke-width="1.5"/>
  <text x="50" y="143" class="mono" font-size="12" fill="#8a7a6a">github    :</text>
  <text x="134" y="143" class="mono" font-size="12" fill="#c8a96e">github.com/Bitan-Banerjee</text>
</svg>
