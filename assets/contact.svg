<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs><style>.mono { font-family: 'Courier New', Courier, monospace; }</style></defs>

  <rect width="800" height="180" fill="#0f0d0b" stroke="#3d3228" stroke-width="1"/>
  <rect width="800" height="36" fill="#241e18"/>
  <line x1="0" y1="36" x2="800" y2="36" stroke="#3d3228" stroke-width="1"/>
  <polygon points="0,0 14,0 0,14" fill="#e8834a" opacity="0.6"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="23" text-anchor="middle" class="mono" font-size="11" fill="#8a7a6a" letter-spacing="1">bash — ping -c 1 contact_points</text>

  <!-- prompt -->
  <text x="24" y="60" class="mono" font-size="12" fill="#e8834a">~</text>
  <text x="36" y="60" class="mono" font-size="12" fill="#c8a96e">$</text>
  <text x="48" y="60" class="mono" font-size="12" fill="#f5ede0">ping -c 1 contact_points</text>

  <!-- LinkedIn — briefcase icon -->
  <rect x="24" y="74" width="16" height="13" rx="1" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <path d="M28 74 v-3 h8 v3" fill="none" stroke="#e8834a" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="24" y1="80" x2="40" y2="80" stroke="#e8834a" stroke-width="1"/>
  <text x="50" y="86" class="mono" font-size="12" fill="#8a7a6a">linkedin  :</text>
  <text x="148" y="86" class="mono" font-size="12" fill="#c8a96e">linkedin.com/in/bitan-banerjee</text>

  <!-- Email — envelope icon -->
  <rect x="24" y="100" width="16" height="12" rx="1" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <polyline points="24,101 32,108 40,101" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <text x="50" y="111" class="mono" font-size="12" fill="#8a7a6a">email     :</text>
  <text x="148" y="111" class="mono" font-size="12" fill="#c8a96e">banerjeebitan@outlook.com</text>

  <!-- GitHub — circle with inner ring icon -->
  <circle cx="32" cy="132" r="8" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <circle cx="32" cy="132" r="3" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <line x1="32" y1="124" x2="32" y2="121" stroke="#e8834a" stroke-width="1.5"/>
  <text x="50" y="136" class="mono" font-size="12" fill="#8a7a6a">github    :</text>
  <text x="148" y="136" class="mono" font-size="12" fill="#c8a96e">github.com/Bitan-Banerjee</text>

  <!-- Website — globe icon (circle + cross lines) -->
  <circle cx="32" cy="158" r="8" fill="none" stroke="#e8834a" stroke-width="1.5"/>
  <line x1="24" y1="158" x2="40" y2="158" stroke="#e8834a" stroke-width="1"/>
  <path d="M32 150 Q36 158 32 166 Q28 158 32 150" fill="none" stroke="#e8834a" stroke-width="1"/>
  <text x="50" y="161" class="mono" font-size="12" fill="#8a7a6a">website   :</text>
  <text x="148" y="161" class="mono" font-size="12" fill="#c8a96e">bitan-banerjee.github.io/Bitan-Banerjee</text>
</svg>
