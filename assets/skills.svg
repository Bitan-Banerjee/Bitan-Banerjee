<svg xmlns="http://www.w3.org/2000/svg" width="800" height="330" viewBox="0 0 800 330">
  <defs><style>.mono { font-family: 'Courier New', Courier, monospace; }</style></defs>

  <rect width="800" height="330" fill="#0f0d0b" stroke="#3d3228" stroke-width="1"/>
  <rect width="800" height="36" fill="#241e18"/>
  <line x1="0" y1="36" x2="800" y2="36" stroke="#3d3228" stroke-width="1"/>
  <polygon points="0,0 14,0 0,14" fill="#e8834a" opacity="0.6"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="23" text-anchor="middle" class="mono" font-size="11" fill="#8a7a6a" letter-spacing="1">bash — ls -la /skills/</text>

  <!-- prompt -->
  <text x="24" y="60" class="mono" font-size="12" fill="#e8834a">~</text>
  <text x="36" y="60" class="mono" font-size="12" fill="#c8a96e">$</text>
  <text x="48" y="60" class="mono" font-size="12" fill="#f5ede0">ls -la /skills/</text>

  <!-- tree root -->
  <text x="24" y="84" class="mono" font-size="12" fill="#e8834a">skills/</text>

  <!-- languages branch -->
  <text x="24"  y="103" class="mono" font-size="12" fill="#3d3228">├──</text>
  <text x="66"  y="103" class="mono" font-size="12" fill="#c8a96e">languages/</text>
  <text x="24"  y="120" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="90"  y="120" class="mono" font-size="12" fill="#f5ede0">Python</text>
  <text x="24"  y="137" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="90"  y="137" class="mono" font-size="12" fill="#f5ede0">SQL</text>
  <text x="24"  y="154" class="mono" font-size="12" fill="#3d3228">│   └──</text>
  <text x="90"  y="154" class="mono" font-size="12" fill="#f5ede0">COBOL</text>

  <!-- data processing branch -->
  <text x="24"  y="173" class="mono" font-size="12" fill="#3d3228">├──</text>
  <text x="66"  y="173" class="mono" font-size="12" fill="#c8a96e">data_processing/</text>
  <text x="24"  y="190" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="90"  y="190" class="mono" font-size="12" fill="#f5ede0">PySpark</text>
  <text x="24"  y="207" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="90"  y="207" class="mono" font-size="12" fill="#f5ede0">ETL / ELT</text>
  <text x="24"  y="224" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="90"  y="224" class="mono" font-size="12" fill="#f5ede0">Data Warehousing</text>
  <text x="24"  y="241" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="90"  y="241" class="mono" font-size="12" fill="#f5ede0">Data Pipelining</text>
  <text x="24"  y="258" class="mono" font-size="12" fill="#3d3228">│   └──</text>
  <text x="90"  y="258" class="mono" font-size="12" fill="#f5ede0">Big Data</text>

  <!-- aws cloud — right column -->
  <text x="340" y="84"  class="mono" font-size="12" fill="#3d3228">├──</text>
  <text x="382" y="84"  class="mono" font-size="12" fill="#c8a96e">aws_cloud/</text>
  <text x="340" y="103" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="103" class="mono" font-size="12" fill="#f5ede0">Step Functions</text>
  <text x="340" y="120" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="120" class="mono" font-size="12" fill="#f5ede0">Lambda</text>
  <text x="340" y="137" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="137" class="mono" font-size="12" fill="#f5ede0">Glue</text>
  <text x="340" y="154" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="154" class="mono" font-size="12" fill="#f5ede0">SQS</text>
  <text x="340" y="171" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="171" class="mono" font-size="12" fill="#f5ede0">S3</text>
  <text x="340" y="188" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="188" class="mono" font-size="12" fill="#f5ede0">RDS</text>
  <text x="340" y="205" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="205" class="mono" font-size="12" fill="#f5ede0">DynamoDB</text>
  <text x="340" y="222" class="mono" font-size="12" fill="#3d3228">│   └──</text>
  <text x="406" y="222" class="mono" font-size="12" fill="#f5ede0">Redshift</text>

  <!-- databases & migration — right column continued -->
  <text x="340" y="241" class="mono" font-size="12" fill="#3d3228">├──</text>
  <text x="382" y="241" class="mono" font-size="12" fill="#c8a96e">databases/</text>
  <text x="340" y="258" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="258" class="mono" font-size="12" fill="#f5ede0">DB2</text>
  <text x="340" y="275" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="275" class="mono" font-size="12" fill="#f5ede0">MS SQL Server</text>
  <text x="340" y="292" class="mono" font-size="12" fill="#3d3228">│   ├──</text>
  <text x="406" y="292" class="mono" font-size="12" fill="#f5ede0">Databricks</text>
  <text x="340" y="309" class="mono" font-size="12" fill="#3d3228">│   └──</text>
  <text x="406" y="309" class="mono" font-size="12" fill="#f5ede0">Qlik Attunity</text>

  <!-- ai tools -->
  <text x="24"  y="277" class="mono" font-size="12" fill="#3d3228">└──</text>
  <text x="66"  y="277" class="mono" font-size="12" fill="#c8a96e">ai_tools/</text>
  <text x="24"  y="294" class="mono" font-size="12" fill="#3d3228">    ├──</text>
  <text x="90"  y="294" class="mono" font-size="12" fill="#f5ede0">Claude Sonnet</text>
  <text x="24"  y="311" class="mono" font-size="12" fill="#3d3228">    ├──</text>
  <text x="90"  y="311" class="mono" font-size="12" fill="#f5ede0">GPT-4.5</text>

  <!-- vertical line left column -->
  <line x1="280" y1="78" x2="280" y2="320" stroke="#3d3228" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- blinking cursor -->
  <rect x="24" y="318" width="7" height="11" fill="#e8834a">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
